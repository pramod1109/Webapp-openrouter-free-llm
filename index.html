<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
    <!-- Marked.js for markdown rendering -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
        :root {
            --bg:        #0d0f12;
            --surface:   #141720;
            --surface2:  #1c2030;
            --border:    #252b3b;
            --accent:    #4f8ef7;
            --accent2:   #7c5cfc;
            --green:     #2dce89;
            --text:      #e8ecf4;
            --text-dim:  #7a869e;
            --user-bg:   linear-gradient(135deg, #4f8ef7 0%, #7c5cfc 100%);
            --radius:    14px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            backdrop-filter: blur(12px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-dot {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--user-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-title {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 17px;
            letter-spacing: -0.3px;
        }

        .header-sub {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 1px;
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(45, 206, 137, 0.12);
            border: 1px solid rgba(45, 206, 137, 0.25);
            color: var(--green);
            font-size: 12px;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: 20px;
        }

        .live-pulse {
            width: 7px;
            height: 7px;
            background: var(--green);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.4; transform: scale(0.8); }
        }

        /* ── Chat Container ── */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-track { background: transparent; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        /* ── Message Wrappers ── */
        .msg-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: msgIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        @keyframes msgIn {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .msg-row.user  { flex-direction: row-reverse; }
        .msg-row.ai    { flex-direction: row; }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 9px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
        }

        .avatar.ai-avatar   { background: var(--surface2); border: 1px solid var(--border); }
        .avatar.user-avatar { background: var(--user-bg); }

        .msg-bubble {
            max-width: min(68%, 620px);
            padding: 13px 16px;
            border-radius: var(--radius);
            font-size: 14.5px;
            line-height: 1.65;
            position: relative;
        }

        .msg-row.user .msg-bubble {
            background: var(--user-bg);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .msg-row.ai .msg-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        /* ── Markdown rendering inside AI bubble ── */
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 8px 0; }
        .msg-bubble li { margin-bottom: 4px; }
        .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
            font-family: 'Syne', sans-serif;
            margin: 12px 0 6px;
            color: var(--text);
        }
        .msg-bubble h1 { font-size: 16px; }
        .msg-bubble h2 { font-size: 15px; }
        .msg-bubble h3 { font-size: 14px; }
        .msg-bubble strong { color: #fff; font-weight: 600; }
        .msg-bubble em { color: var(--text-dim); }
        .msg-bubble code {
            background: rgba(79, 142, 247, 0.12);
            border: 1px solid rgba(79, 142, 247, 0.2);
            color: #7fc3ff;
            padding: 1px 6px;
            border-radius: 5px;
            font-family: 'Fira Code', 'Cascadia Code', monospace;
            font-size: 13px;
        }
        .msg-bubble pre {
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .msg-bubble pre code {
            background: none;
            border: none;
            padding: 0;
            font-size: 13px;
        }
        .msg-bubble a { color: var(--accent); text-decoration: none; }
        .msg-bubble a:hover { text-decoration: underline; }
        .msg-bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
        .msg-bubble blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 12px;
            color: var(--text-dim);
            margin: 8px 0;
        }

        /* ── Live Context Badge on AI Message ── */
        .live-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.4px;
            text-transform: uppercase;
            color: var(--green);
            background: rgba(45, 206, 137, 0.1);
            border: 1px solid rgba(45, 206, 137, 0.2);
            padding: 3px 8px;
            border-radius: 20px;
            margin-bottom: 8px;
        }

        .live-dot { width: 5px; height: 5px; background: var(--green); border-radius: 50%; }

        /* ── Timestamp ── */
        .msg-meta {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 5px;
            padding: 0 4px;
        }
        .msg-row.user .msg-meta { text-align: right; }

        /* ── Copy button ── */
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 6px;
            padding: 3px 7px;
            font-size: 11px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s;
        }
        .msg-bubble:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { color: var(--text); }
        .copy-btn.copied { color: var(--green); border-color: rgba(45,206,137,0.3); }

        /* ── Typing Indicator ── */
        .typing-row {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            animation: msgIn 0.3s ease forwards;
            opacity: 0;
        }

        .typing-bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            border-bottom-left-radius: 4px;
            padding: 14px 18px;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            background: var(--text-dim);
            border-radius: 50%;
            animation: typingBounce 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.18s; }
        .typing-dot:nth-child(3) { animation-delay: 0.36s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: translateY(0);  opacity: 0.4; }
            40%            { transform: translateY(-6px); opacity: 1; }
        }

        /* ── Input Area ── */
        .input-area {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 16px 20px;
            display: flex;
            gap: 10px;
            align-items: flex-end;
            flex-shrink: 0;
        }

        .input-wrapper {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: flex-end;
            padding: 4px 4px 4px 14px;
            transition: border-color 0.2s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14.5px;
            line-height: 1.5;
            resize: none;
            min-height: 24px;
            max-height: 120px;
            padding: 8px 6px 8px 0;
            overflow-y: auto;
        }
        textarea::placeholder { color: var(--text-dim); }
        textarea::-webkit-scrollbar { display: none; }

        .send-btn {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--user-bg);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: opacity 0.2s, transform 0.1s;
        }
        .send-btn:hover:not(:disabled) { opacity: 0.85; transform: scale(1.05); }
        .send-btn:active:not(:disabled) { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .send-btn svg { width: 17px; height: 17px; fill: #fff; }

        /* ── Welcome Screen ── */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            animation: msgIn 0.5s ease forwards;
            opacity: 0;
        }

        .welcome-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .welcome h2 {
            font-family: 'Syne', sans-serif;
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #4f8ef7, #7c5cfc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome p {
            color: var(--text-dim);
            font-size: 14px;
            max-width: 360px;
            margin: 0 auto 24px;
            line-height: 1.6;
        }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            max-width: 500px;
            margin: 0 auto;
        }

        .suggestion-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 13px;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-chip:hover {
            border-color: var(--accent);
            color: var(--text);
            background: rgba(79, 142, 247, 0.08);
        }

        /* ── Responsive ── */
        @media (max-width: 600px) {
            #chat-container { padding: 16px 12px; }
            .msg-bubble { max-width: 88%; font-size: 14px; }
            .input-area { padding: 12px; }
            header { padding: 12px 16px; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logo-dot">⚡</div>
        <div>
            <div class="header-title">News AI</div>
            <div class="header-sub">Powered by Claude + Live Web</div>
        </div>
    </div>
    <div class="live-badge">
        <div class="live-pulse"></div>
        Live Data
    </div>
</header>

<div id="chat-container">
    <div class="welcome" id="welcome-screen">
        <div class="welcome-icon">🌐</div>
        <h2>Ask me anything</h2>
        <p>I have access to live news and web data. Ask about breaking news, current events, prices, or anything you need to know.</p>
        <div class="suggestions">
            <div class="suggestion-chip" onclick="usePrompt(this)">📰 What's in the news today?</div>
            <div class="suggestion-chip" onclick="usePrompt(this)">📈 Latest stock market news</div>
            <div class="suggestion-chip" onclick="usePrompt(this)">🌍 Current world events</div>
            <div class="suggestion-chip" onclick="usePrompt(this)">💡 Explain quantum computing</div>
        </div>
    </div>
</div>

<div class="input-area">
    <div class="input-wrapper">
        <textarea
            id="userInput"
            rows="1"
            placeholder="Ask anything… news, facts, analysis"
            onkeydown="handleKey(event)"
            oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
            </svg>
        </button>
    </div>
</div>

<script>
    // ── Config ──────────────────────────────────────────────────────────────
    // REPLACE this with your actual API Gateway URL:
    const API_URL = 'https://gaxby7gco5.execute-api.us-east-2.amazonaws.com/test/ask';

    // Configure marked for safe rendering
    marked.setOptions({
        breaks: true,
        gfm: true,
    });

    // ── State ────────────────────────────────────────────────────────────────
    let isLoading = false;

    // ── Helpers ──────────────────────────────────────────────────────────────
    function formatTime() {
        return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function usePrompt(el) {
        const input = document.getElementById('userInput');
        // Strip leading emoji + space
        input.value = el.innerText.replace(/^[\u{1F300}-\u{1FFFF}]\s*/u, '');
        autoResize(input);
        input.focus();
    }

    function scrollToBottom() {
        const c = document.getElementById('chat-container');
        c.scrollTop = c.scrollHeight;
    }

    // ── Render helpers ───────────────────────────────────────────────────────
    function appendUserMessage(text) {
        const welcome = document.getElementById('welcome-screen');
        if (welcome) welcome.remove();

        const container = document.getElementById('chat-container');
        const row = document.createElement('div');
        row.className = 'msg-row user';
        row.innerHTML = `
            <div>
                <div class="msg-bubble">
                    ${escapeHtml(text)}
                </div>
                <div class="msg-meta">${formatTime()}</div>
            </div>
            <div class="avatar user-avatar">👤</div>
        `;
        container.appendChild(row);
        scrollToBottom();
    }

    function showTypingIndicator() {
        const container = document.getElementById('chat-container');
        const row = document.createElement('div');
        row.className = 'typing-row';
        row.id = 'typing-indicator';
        row.innerHTML = `
            <div class="avatar ai-avatar">⚡</div>
            <div class="typing-bubble">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        `;
        container.appendChild(row);
        scrollToBottom();
    }

    function removeTypingIndicator() {
        const el = document.getElementById('typing-indicator');
        if (el) el.remove();
    }

    function appendAiMessage(text, hadLiveContext) {
        const container = document.getElementById('chat-container');
        const row = document.createElement('div');
        row.className = 'msg-row ai';

        const liveTag = hadLiveContext
            ? `<div class="live-tag"><div class="live-dot"></div>Live Data</div>`
            : '';

        // Render markdown
        const htmlContent = marked.parse(text);

        row.innerHTML = `
            <div class="avatar ai-avatar">⚡</div>
            <div>
                <div class="msg-bubble">
                    <button class="copy-btn" onclick="copyMsg(this, \`${text.replace(/`/g, '\\`')}\`)">Copy</button>
                    ${liveTag}
                    <div class="md-content">${htmlContent}</div>
                </div>
                <div class="msg-meta">${formatTime()}</div>
            </div>
        `;
        container.appendChild(row);
        scrollToBottom();
    }

    function appendErrorMessage(text) {
        const container = document.getElementById('chat-container');
        const row = document.createElement('div');
        row.className = 'msg-row ai';
        row.innerHTML = `
            <div class="avatar ai-avatar">⚡</div>
            <div>
                <div class="msg-bubble" style="border-color: rgba(255,80,80,0.3); color: #ff8080;">
                    ⚠️ ${escapeHtml(text)}
                </div>
                <div class="msg-meta">${formatTime()}</div>
            </div>
        `;
        container.appendChild(row);
        scrollToBottom();
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }

    async function copyMsg(btn, text) {
        try {
            await navigator.clipboard.writeText(text);
            btn.textContent = '✓ Copied';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'Copy';
                btn.classList.remove('copied');
            }, 2000);
        } catch (e) {
            btn.textContent = 'Failed';
        }
    }

    // ── Main send function ───────────────────────────────────────────────────
    async function sendMessage() {
        if (isLoading) return;

        const input = document.getElementById('userInput');
        const btn = document.getElementById('sendBtn');
        const prompt = input.value.trim();
        if (!prompt) return;

        input.value = '';
        input.style.height = 'auto';
        isLoading = true;
        btn.disabled = true;

        appendUserMessage(prompt);
        showTypingIndicator();

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });

            removeTypingIndicator();

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                throw new Error(errData.error || `Server error ${response.status}`);
            }

            const data = await response.json();
            appendAiMessage(data.response, data.had_live_context);

        } catch (error) {
            removeTypingIndicator();
            appendErrorMessage(error.message || 'Connection failed. Please try again.');
        } finally {
            isLoading = false;
            btn.disabled = false;
            input.focus();
        }
    }
</script>
</body>
</html>
